global:
  environment: development

image:
  registry: ghcr.io
  repository: kirillvladov/account-service
  tag: latest
  pullPolicy: Always
  dockerfile: Dockerfile

# Image pull secrets (for private registries)
imagePullSecrets:
  - name: ghcr-secret

replicaCount:
  min: 1
  max: 1

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 400m
    memory: 256Mi

env:
  POSTGRES_URL: "secret"
  JWT_SECRET: "secret"
  GRPC_PORT: 50052
  DEBUG_GRPC_PORT: 8081

metrics:
  enabled: true
  port: 8001
  path: "/metrics"

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false

hpa:
  enabled: false

networkPolicy:
  enabled: false

resourceQuota:
  enabled: false

podDisruptionBudget:
  enabled: false

security:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0

healthCheck:
  enabled: true
  livenessProbe:
    path: /liveness
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    path: /readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1